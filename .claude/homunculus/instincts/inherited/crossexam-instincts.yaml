# Crossexam Workflow Secure Credentials Management

## Action

Follow the secure-credentials-management workflow:
1. Remove sensitive credentials from committed configuration files.
2. Update scripts or configuration to load credentials from environment variables.
3. Update environment template files to document required variables.
4. Update .gitignore to exclude local runtime or credential files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: config/*.yaml, scripts/*.sh, .env.example

