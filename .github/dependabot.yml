version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Disable routine minimum-version bump PRs. Dependabot security updates
    # use a separate internal pull-request limit and remain enabled.
    open-pull-requests-limit: 0
    groups:
      pip-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
