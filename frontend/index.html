<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witness Prep — Cross-Examination</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #666;
    --accent: #c8a84e;
    --accent-dim: #8a7030;
    --red: #cc3333;
    --green: #338833;
    --orange: #cc8800;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-right: auto; }
  .topbar label { font-size: 11px; color: var(--text-dim); }
  .topbar input[type="text"] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; border-radius: 4px; font-size: 12px; width: 160px; font-family: monospace;
  }
  .topbar input[type="text"]:focus { outline: none; border-color: var(--accent); }

  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--border);
    color: var(--text-dim); white-space: nowrap;
  }
  .badge.active { background: var(--green); color: #fff; }
  .badge.waiting { background: var(--accent-dim); color: #fff; }
  .badge.error { background: var(--red); color: #fff; }
  .badge.paused { background: var(--orange); color: #000; }
  .badge.completed { background: #555; color: #ccc; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left sidebar — session list */
  .leftbar {
    width: 260px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .leftbar-header {
    padding: 12px 14px 8px; border-bottom: 1px solid var(--border); display: flex;
    align-items: center; justify-content: space-between; gap: 8px;
  }
  .leftbar-header h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
  .session-list { flex: 1; overflow-y: auto; padding: 6px; }
  .session-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px;
    border: 1px solid transparent; transition: all 0.1s;
  }
  .session-item:hover { background: var(--bg); }
  .session-item.active { background: var(--bg); border-color: var(--accent-dim); }
  .session-item .si-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .session-item .si-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 8px; align-items: center; }
  .session-item .si-meta .s { font-size: 9px; padding: 1px 5px; border-radius: 4px; }

  /* Chat */
  .chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header {
    padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
  }
  .chat-header .ch-title { font-size: 13px; font-weight: 600; }
  .chat-header .ch-controls { margin-left: auto; display: flex; gap: 6px; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.witness { align-self: flex-end; background: #1a2a1a; border: 1px solid #2a4a2a; color: #b0d0b0; }
  .msg.examiner { align-self: flex-start; background: #1a1a2a; border: 1px solid #3a3a5a; color: #b0b0e0; }
  .msg.system { align-self: center; background: transparent; color: var(--text-dim); font-size: 12px; text-align: center; max-width: 100%; }
  .msg .mlabel { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; opacity: 0.6; }
  .msg .mtime { font-size: 10px; color: var(--text-dim); margin-top: 4px; opacity: 0.5; }

  .typing { align-self: flex-start; padding: 8px 14px; display: flex; gap: 4px; }
  .typing span { width: 6px; height: 6px; background: var(--accent-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

  .inputbar {
    display: flex; gap: 8px; padding: 10px 20px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .inputbar textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: var(--radius); font-size: 14px; resize: none;
    font-family: inherit; min-height: 40px; max-height: 100px;
  }
  .inputbar textarea:focus { outline: none; border-color: var(--accent); }
  .inputbar textarea:disabled { opacity: 0.4; }

  button {
    background: var(--accent); color: #000; border: none; padding: 8px 16px;
    border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.sm { padding: 5px 10px; font-size: 11px; }
  button.danger { background: var(--red); color: #fff; }
  button.secondary { background: var(--border); color: var(--text); }
  button.ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  button.ghost:hover { border-color: var(--accent-dim); color: var(--text); }

  /* Right sidebar */
  .rightbar {
    width: 320px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
  }
  .rb-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .rb-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .stat-row .val { color: var(--accent); font-family: monospace; font-size: 12px; }
  .exhibit-item { font-size: 12px; padding: 4px 0; color: var(--text-dim); }
  .exhibit-item strong { color: var(--accent-dim); }

  .scorecard-entry { font-size: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .scorecard-entry:last-child { border-bottom: none; }
  .sev { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-bottom: 3px; }
  .sev.critical { background: var(--red); color: #fff; }
  .sev.moderate { background: var(--orange); color: #000; }
  .sev.minor { background: var(--border); color: var(--text-dim); }

  .empty-state { color: var(--text-dim); font-size: 12px; text-align: center; padding: 30px 16px; }
  .hidden { display: none !important; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .flex { display: flex; }
  .gap-2 { gap: 4px; }
  .gap-4 { gap: 8px; }
  .items-center { align-items: center; }
  .mt-2 { margin-top: 4px; }
  .w-full { width: 100%; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚖ WITNESS PREP</h1>
  <label>Token</label>
  <input type="text" id="tokenInput" value="dev-key" spellcheck="false">
  <span id="globalStatus" class="badge">ready</span>
  <button id="createBtn" class="secondary sm">+ New Session</button>
</div>

<div class="main">
  <!-- Left sidebar: session list -->
  <div class="leftbar">
    <div class="leftbar-header">
      <h3>Sessions</h3>
      <span id="sessionCount" style="font-size:11px;color:var(--text-dim)">0</span>
    </div>
    <div class="session-list" id="sessionList">
      <div class="empty-state">No sessions yet.<br>Click + New Session to begin.</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="chat-header" id="chatHeader">
      <span class="ch-title" id="chatTitle">Select a session</span>
      <span id="chatStatus" class="badge">—</span>
      <div class="ch-controls" id="chatControls" style="display:none">
        <button id="pauseBtn" class="ghost sm" title="Pause">⏸</button>
        <button id="resumeBtn" class="ghost sm hidden" title="Resume">▶</button>
        <button id="endBtn" class="ghost sm" title="End session &amp; finalize">■</button>
        <button id="destroyBtn" class="ghost sm danger" title="Destroy session">✕</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="msg system">Create a session to begin cross-examination.</div>
    </div>
    <div class="typing hidden" id="typingIndicator"><span></span><span></span><span></span></div>
    <div class="inputbar">
      <textarea id="answerInput" placeholder="Type witness answer..." disabled></textarea>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <!-- Right sidebar: session details + scorecard -->
  <div class="rightbar" id="rightbar">
    <div class="rb-section">
      <h3>Session</h3>
      <div class="stat-row"><span>ID</span><span class="val" id="sid">—</span></div>
      <div class="stat-row"><span>Room</span><span class="val" id="room">—</span></div>
      <div class="stat-row"><span>Status</span><span class="val" id="sstatus">—</span></div>
      <div class="stat-row"><span>Turn</span><span class="val" id="turn">0</span></div>
    </div>
    <div class="rb-section" id="caseSection">
      <h3>Case</h3>
      <div class="stat-row"><span>Title</span><span class="val" id="caseTitle">—</span></div>
      <div id="exhibitList"></div>
    </div>
    <div class="rb-section">
      <h3>Scorecard</h3>
      <div class="stat-row"><span>Risk</span><span class="val" id="risk">—</span></div>
      <div class="stat-row"><span>Entries</span><span class="val" id="entryCount">0</span></div>
      <div id="scorecardEntries" style="margin-top:6px"></div>
    </div>
  </div>
</div>

<script>
// --- State ---
let currentSessionId = null;
let sessions = {};
let ws = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
let scorecardTimer = null;
let turnNum = 0;
const MAX_RECONNECT = 10;

// --- DOM refs ---
const $ = id => document.getElementById(id);

// --- Helpers ---
function getToken() { return $('tokenInput').value.trim() || 'dev-key'; }

function setGlobalStatus(text, cls) {
  const gs = $('globalStatus');
  gs.textContent = text;
  gs.className = 'badge' + (cls ? ' ' + cls : '');
}

function timeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function addMessage(role, text) {
  const area = $('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'witness' ? 'Witness' : role === 'examiner' ? 'Examiner' : '';
  div.innerHTML = (label ? `<div class="mlabel">${label}</div>` : '') + text + `<div class="mtime">${timeStr()}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping(show) {
  $('typingIndicator').classList.toggle('hidden', !show);
}

// --- Session list ---
function renderSessionList() {
  const list = $('sessionList');
  const ids = Object.keys(sessions);
  $('sessionCount').textContent = ids.length;
  if (ids.length === 0) {
    list.innerHTML = '<div class="empty-state">No sessions yet.<br>Click + New Session to begin.</div>';
    return;
  }
  list.innerHTML = '';
  for (const id of ids) {
    const s = sessions[id];
    const div = document.createElement('div');
    div.className = 'session-item' + (id === currentSessionId ? ' active' : '');
    div.dataset.sid = id;
    const statusClass = s.status === 'active' ? 'active' : s.status === 'paused' ? 'paused' : s.status === 'completed' ? 'completed' : '';
    div.innerHTML = `
      <div class="si-title">${s.case_title || id.slice(0,12)}</div>
      <div class="si-meta">
        <span class="s" style="background:${statusClass ? 'var(--green)' : 'var(--border)'};color:${statusClass ? '#fff' : '#666'}">${s.status}</span>
        <span>t${s.turn_number}</span>
        <span style="font-family:monospace;font-size:10px">${id.slice(0,10)}</span>
      </div>
    `;
    div.addEventListener('click', () => selectSession(id));
    list.appendChild(div);
  }
}

// --- Session selection ---
async function selectSession(sid) {
  if (!sid || !sessions[sid]) return;

  // Close old WS
  disconnectWS();

  currentSessionId = sid;
  renderSessionList();

  // Clear chat
  $('messages').innerHTML = '';
  turnNum = 0;

  // Fetch session details
  try {
    const resp = await fetch(`/session/${sid}?token=${getToken()}`);
    if (resp.ok) {
      const data = await resp.json();
      updateSidebar(data);
      $('chatTitle').textContent = data.case_title || sid.slice(0,16);
      $('chatStatus').textContent = data.status;
      $('chatStatus').className = 'badge ' + (data.status === 'active' ? 'active' : data.status === 'paused' ? 'paused' : 'completed');
      $('chatControls').style.display = 'flex';
      $('pauseBtn').classList.toggle('hidden', data.status !== 'active');
      $('resumeBtn').classList.toggle('hidden', data.status !== 'paused');
      addMessage('system', `Session <strong>${sid.slice(0,12)}</strong> — ${data.status}`);
      if (data.status === 'active') {
        connectWS(sid);
      } else {
        $('answerInput').disabled = true;
        $('sendBtn').disabled = true;
      }
    }
  } catch (e) {
    addMessage('system', `Error loading session: ${e.message}`);
  }

  // Start scorecard polling
  startScorecardPoll(sid);
}

function updateSidebar(data) {
  $('sid').textContent = data.session_id;
  $('room').textContent = sessions[data.session_id]?.room || '—';
  $('sstatus').textContent = data.status;
  $('turn').textContent = data.turn_number;
  $('caseTitle').textContent = data.case_title || '—';
  const el = $('exhibitList');
  el.innerHTML = '';
  if (data.exhibits && data.exhibits.length > 0) {
    for (const ex of data.exhibits) {
      el.innerHTML += `<div class="exhibit-item"><strong>${ex.id}</strong>: ${ex.description}</div>`;
    }
  } else {
    el.innerHTML = '<div class="exhibit-item" style="color:var(--text-dim)">No exhibits</div>';
  }
}

// --- WebSocket ---
function connectWS(sid) {
  if (ws) { ws.close(); ws = null; }
  const token = getToken();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/session/${sid}/transcript?token=${token}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    $('answerInput').disabled = false;
    $('sendBtn').disabled = false;
    $('answerInput').focus();
    reconnectAttempts = 0;
    setGlobalStatus('connected', 'active');
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    showTyping(false);
    if (data.type === 'question') {
      turnNum++;
      $('turn').textContent = turnNum;
      addMessage('examiner', data.text);
      if (data.strategy) addMessage('system', `Strategy: ${data.strategy}`);
      // Fetch scorecard after each question
      setTimeout(() => refreshScorecard(currentSessionId), 500);
    } else if (data.type === 'error') {
      addMessage('system', `Error [${data.code}]: ${data.message || ''}`);
    }
  };

  ws.onclose = () => {
    $('answerInput').disabled = true;
    $('sendBtn').disabled = true;
    ws = null;
    if (currentSessionId && sessions[currentSessionId]?.status === 'active') {
      setGlobalStatus('reconnecting...', 'waiting');
      scheduleReconnect(sid);
    }
  };

  ws.onerror = () => {
    setGlobalStatus('ws error', 'error');
  };
}

function disconnectWS() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  reconnectAttempts = MAX_RECONNECT; // prevent auto-reconnect
  if (ws) { ws.close(); ws = null; }
}

function scheduleReconnect(sid) {
  if (reconnectAttempts >= MAX_RECONNECT) return;
  reconnectAttempts++;
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
  reconnectTimer = setTimeout(() => {
    if (currentSessionId === sid) connectWS(sid);
  }, delay);
}

// --- Scorecard ---
async function refreshScorecard(sid) {
  if (!sid) return;
  try {
    // Try snapshot first (doesn't finalize), fall back to scorecard
    let resp = await fetch(`/session/${sid}/snapshot?token=${getToken()}`);
    if (!resp.ok) {
      resp = await fetch(`/session/${sid}/scorecard?token=${getToken()}`);
    }
    if (!resp.ok) return;
    const sc = await resp.json();
    $('risk').textContent = sc.credibility_risk;
    $('entryCount').textContent = sc.entries.length;
    const container = $('scorecardEntries');
    container.innerHTML = '';
    if (sc.entries.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:8px 0">No entries yet</div>';
      return;
    }
    for (const e of sc.entries) {
      const div = document.createElement('div');
      div.className = 'scorecard-entry';
      div.innerHTML = `
        <span class="sev ${e.severity}">${e.severity}</span>
        <div style="margin:2px 0">${e.description}</div>
        ${e.witness_answer ? `<div style="color:var(--text-dim);font-size:11px">"${e.witness_answer.slice(0,60)}${e.witness_answer.length > 60 ? '...' : ''}"</div>` : ''}
      `;
      container.appendChild(div);
    }
  } catch (_) {}
}

function startScorecardPoll(sid) {
  if (scorecardTimer) { clearInterval(scorecardTimer); scorecardTimer = null; }
  refreshScorecard(sid);
  scorecardTimer = setInterval(() => {
    if (currentSessionId === sid) refreshScorecard(sid);
    else { clearInterval(scorecardTimer); scorecardTimer = null; }
  }, 3000);
}

// --- Send answer ---
function sendAnswer() {
  const text = $('answerInput').value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'answer', transcript: text, pause_ms: 0 }));
  addMessage('witness', text);
  $('answerInput').value = '';
  $('answerInput').focus();
  showTyping(true);
}

// --- Session lifecycle ---
async function createSession() {
  $('createBtn').disabled = true;
  $('createBtn').textContent = 'Creating...';
  setGlobalStatus('creating...', 'waiting');
  try {
    // First check if test_case.txt exists; fall back to path from context
    const paths = ['test_case.txt'];
    const resp = await fetch(`/session/create?token=${getToken()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(paths),
    });
    if (!resp.ok) {
      const err = await resp.json();
      addMessage('system', `Create failed: ${err.detail}`);
      setGlobalStatus('error', 'error');
      return;
    }
    const data = await resp.json();
    sessions[data.session_id] = {
      status: 'active',
      case_title: data.case_title || '',
      turn_number: 0,
      room: data.room,
    };
    renderSessionList();
    await selectSession(data.session_id);
    setGlobalStatus('connected', 'active');
  } catch (e) {
    addMessage('system', `Connection error: ${e.message}`);
    setGlobalStatus('error', 'error');
  } finally {
    $('createBtn').disabled = false;
    $('createBtn').textContent = '+ New Session';
  }
}

async function pauseSession() {
  if (!currentSessionId) return;
  try {
    const resp = await fetch(`/session/${currentSessionId}/pause?token=${getToken()}`, { method: 'POST' });
    if (resp.ok) {
      sessions[currentSessionId].status = 'paused';
      renderSessionList();
      $('chatStatus').textContent = 'paused';
      $('chatStatus').className = 'badge paused';
      $('pauseBtn').classList.add('hidden');
      $('resumeBtn').classList.remove('hidden');
      $('answerInput').disabled = true;
      $('sendBtn').disabled = true;
      addMessage('system', 'Session paused.');
    }
  } catch (e) {
    addMessage('system', `Pause failed: ${e.message}`);
  }
}

async function resumeSession() {
  if (!currentSessionId) return;
  try {
    const resp = await fetch(`/session/${currentSessionId}/resume?token=${getToken()}`, { method: 'POST' });
    if (resp.ok) {
      sessions[currentSessionId].status = 'active';
      renderSessionList();
      $('chatStatus').textContent = 'active';
      $('chatStatus').className = 'badge active';
      $('pauseBtn').classList.remove('hidden');
      $('resumeBtn').classList.add('hidden');
      connectWS(currentSessionId);
      addMessage('system', 'Session resumed.');
    }
  } catch (e) {
    addMessage('system', `Resume failed: ${e.message}`);
  }
}

async function endSession() {
  if (!currentSessionId) return;
  try {
    const resp = await fetch(`/session/${currentSessionId}/scorecard?token=${getToken()}`, { method: 'GET' });
    if (resp.ok) {
      sessions[currentSessionId].status = 'completed';
      renderSessionList();
      $('chatStatus').textContent = 'completed';
      $('chatStatus').className = 'badge completed';
      $('chatControls').style.display = 'none';
      disconnectWS();
      $('answerInput').disabled = true;
      $('sendBtn').disabled = true;
      if (scorecardTimer) { clearInterval(scorecardTimer); scorecardTimer = null; }
      await refreshScorecard(currentSessionId);
      addMessage('system', 'Session finalized. Scorecard ready.');
    }
  } catch (e) {
    addMessage('system', `Finalize failed: ${e.message}`);
  }
}

async function destroySession() {
  if (!currentSessionId) return;
  if (!confirm('Permanently destroy this session?')) return;
  try {
    await fetch(`/session/${currentSessionId}/destroy?token=${getToken()}`, { method: 'POST' });
    delete sessions[currentSessionId];
    disconnectWS();
    if (scorecardTimer) { clearInterval(scorecardTimer); scorecardTimer = null; }
    currentSessionId = null;
    renderSessionList();
    $('messages').innerHTML = '<div class="msg system">Session destroyed. Create a new one to begin.</div>';
    $('chatTitle').textContent = 'Select a session';
    $('chatStatus').textContent = '—';
    $('chatStatus').className = 'badge';
    $('chatControls').style.display = 'none';
    $('answerInput').disabled = true;
    $('sendBtn').disabled = true;
    // Reset sidebar
    $('sid').textContent = '—';
    $('room').textContent = '—';
    $('sstatus').textContent = '—';
    $('turn').textContent = '0';
    $('caseTitle').textContent = '—';
    $('exhibitList').innerHTML = '';
    $('risk').textContent = '—';
    $('entryCount').textContent = '0';
    $('scorecardEntries').innerHTML = '';
    setGlobalStatus('ready', '');
  } catch (e) {
    addMessage('system', `Destroy failed: ${e.message}`);
  }
}

// --- Refresh session list from server ---
async function refreshSessionList() {
  try {
    const resp = await fetch(`/sessions?token=${getToken()}`);
    if (!resp.ok) return;
    const list = await resp.json();
    // Merge server data into local state
    for (const s of list) {
      if (!sessions[s.session_id]) {
        sessions[s.session_id] = {};
      }
      sessions[s.session_id] = { ...sessions[s.session_id], ...s };
    }
    // Remove sessions no longer on server (completed/destroyed)
    const serverIds = new Set(list.map(s => s.session_id));
    for (const id of Object.keys(sessions)) {
      if (!serverIds.has(id)) delete sessions[id];
    }
    renderSessionList();
  } catch (_) {}
}

// --- Event listeners ---
$('createBtn').addEventListener('click', createSession);
$('pauseBtn').addEventListener('click', pauseSession);
$('resumeBtn').addEventListener('click', resumeSession);
$('endBtn').addEventListener('click', endSession);
$('destroyBtn').addEventListener('click', destroySession);
$('sendBtn').addEventListener('click', sendAnswer);
$('answerInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAnswer(); }
});

// Poll session list every 5s
setInterval(refreshSessionList, 5000);
refreshSessionList();
</script>
</body>
