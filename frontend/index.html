<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witness Prep — Cross-Examination</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #666;
    --accent: #c8a84e;
    --accent-dim: #8a7030;
    --red: #cc3333;
    --green: #338833;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
    margin-right: auto;
  }
  .topbar label { font-size: 12px; color: var(--text-dim); }
  .topbar input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    width: 200px;
    font-family: monospace;
  }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--border);
    color: var(--text-dim);
  }
  .badge.active { background: var(--green); color: #fff; }
  .badge.waiting { background: var(--accent-dim); color: #fff; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.witness {
    align-self: flex-end;
    background: #1a2a1a;
    border: 1px solid #2a4a2a;
    color: #b0d0b0;
  }
  .msg.examiner {
    align-self: flex-start;
    background: #1a1a2a;
    border: 1px solid #3a3a5a;
    color: #b0b0e0;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    max-width: 100%;
  }
  .msg .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    opacity: 0.6;
  }
  .inputbar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .inputbar textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    resize: none;
    font-family: inherit;
    min-height: 44px;
    max-height: 120px;
  }
  .inputbar textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.secondary {
    background: var(--border);
    color: var(--text);
  }

  .sidebar {
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
  }
  .stat-row .val { color: var(--accent); font-family: monospace; }
  .scorecard-entry {
    font-size: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .scorecard-entry .sev {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .sev.critical { background: var(--red); color: #fff; }
  .sev.moderate { background: #cc8800; color: #000; }
  .sev.minor { background: var(--border); color: var(--text-dim); }
  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚖ WITNESS PREP</h1>
  <label>API Token</label>
  <input type="text" id="tokenInput" value="dev-key" spellcheck="false">
  <button id="createSessionBtn" class="secondary">+ New Session</button>
  <span id="sessionBadge" class="badge">no session</span>
  <span id="wsBadge" class="badge">disconnected</span>
</div>

<div class="main">
  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="msg system">Create a session to begin cross-examination.</div>
    </div>
    <div class="inputbar">
      <textarea id="answerInput" placeholder="Type witness answer..." disabled></textarea>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Session</h3>
      <div class="stat-row"><span>ID</span><span class="val" id="sessionId">—</span></div>
      <div class="stat-row"><span>Room</span><span class="val" id="roomName">—</span></div>
      <div class="stat-row"><span>Turn</span><span class="val" id="turnCount">0</span></div>
    </div>
    <div class="sidebar-section">
      <h3>Scorecard</h3>
      <div class="stat-row"><span>Risk</span><span class="val" id="riskLevel">—</span></div>
      <div class="stat-row"><span>Entries</span><span class="val" id="entryCount">0</span></div>
      <button id="refreshScorecardBtn" class="secondary" style="width:100%;margin-top:8px" disabled>Refresh Scorecard</button>
      <div id="scorecardEntries"></div>
    </div>
  </div>
</div>

<script>
// --- State ---
let sessionId = null;
let roomName = null;
let ws = null;
let turnNum = 0;

const $ = id => document.getElementById(id);
const msgArea = $('messages');
const answerInput = $('answerInput');
const sendBtn = $('sendBtn');
const createBtn = $('createSessionBtn');
const tokenInput = $('tokenInput');
const sessionBadge = $('sessionBadge');
const wsBadge = $('wsBadge');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'witness' ? 'Witness' : role === 'examiner' ? 'Examiner' : 'System';
  div.innerHTML = `<div class="label">${label}</div>${text}`;
  msgArea.appendChild(div);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function setSessionBadge(text, cls) {
  sessionBadge.textContent = text;
  sessionBadge.className = 'badge' + (cls ? ' ' + cls : '');
}

function setWsBadge(text, cls) {
  wsBadge.textContent = text;
  wsBadge.className = 'badge' + (cls ? ' ' + cls : '');
}

function getToken() {
  return tokenInput.value.trim() || 'dev-key';
}

// --- WebSocket ---
function connectWS(sid) {
  if (ws) { ws.close(); ws = null; }
  const token = getToken();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/session/${sid}/transcript?token=${token}`;
  ws = new WebSocket(url);
  setWsBadge('connecting', 'waiting');

  ws.onopen = () => {
    setWsBadge('connected', 'active');
    answerInput.disabled = false;
    sendBtn.disabled = false;
    answerInput.focus();
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'question') {
      turnNum++;
      $('turnCount').textContent = turnNum;
      addMessage('examiner', data.text);
      if (data.strategy) {
        addMessage('system', `Strategy: ${data.strategy}`);
      }
    } else if (data.type === 'error') {
      addMessage('system', `Error [${data.code}]: ${data.message || ''}`);
    }
  };

  ws.onclose = () => {
    setWsBadge('disconnected', '');
    answerInput.disabled = true;
    sendBtn.disabled = true;
    ws = null;
  };

  ws.onerror = () => {
    setWsBadge('error', '');
    addMessage('system', 'WebSocket connection error. Check your API token.');
  };
}

// --- Create Session ---
createBtn.addEventListener('click', async () => {
  createBtn.disabled = true;
  createBtn.textContent = 'Creating...';
  try {
    const resp = await fetch(`/session/create?token=${getToken()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(['test_case.txt']),
    });
    if (!resp.ok) {
      const err = await resp.json();
      addMessage('system', `Failed to create session: ${err.detail}`);
      return;
    }
    const data = await resp.json();
    sessionId = data.session_id;
    roomName = data.room;
    $('sessionId').textContent = sessionId;
    $('roomName').textContent = roomName;
    setSessionBadge(`session: ${sessionId.slice(0,12)}...`, 'active');
    addMessage('system', `Session created — room <strong>${roomName}</strong>`);
    addMessage('system', 'Enter a witness answer to begin cross-examination.');
    connectWS(sessionId);
    $('refreshScorecardBtn').disabled = false;
  } catch (err) {
    addMessage('system', `Connection error: ${err.message}`);
  } finally {
    createBtn.disabled = false;
    createBtn.textContent = '+ New Session';
  }
});

// --- Send Answer ---
function sendAnswer() {
  const text = answerInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'answer', transcript: text, pause_ms: 0 }));
  addMessage('witness', text);
  answerInput.value = '';
  answerInput.focus();
}

sendBtn.addEventListener('click', sendAnswer);
answerInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAnswer();
  }
});

// --- Scorecard ---
$('refreshScorecardBtn').addEventListener('click', async () => {
  if (!sessionId) return;
  try {
    const resp = await fetch(`/session/${sessionId}/scorecard?token=${getToken()}`);
    if (!resp.ok) {
      addMessage('system', `Scorecard fetch failed: ${resp.status}`);
      return;
    }
    const sc = await resp.json();
    $('riskLevel').textContent = sc.credibility_risk;
    $('entryCount').textContent = sc.entries.length;

    const container = $('scorecardEntries');
    container.innerHTML = '';
    if (sc.entries.length === 0) {
      container.innerHTML = '<div class="empty-state">No entries yet.</div>';
    } else {
      for (const e of sc.entries) {
        const div = document.createElement('div');
        div.className = 'scorecard-entry';
        div.innerHTML = `
          <span class="sev ${e.severity}">${e.severity}</span>
          <div>${e.description}</div>
          <div style="color:var(--text-dim);font-size:11px;margin-top:2px">
            ${e.witness_answer ? `"${e.witness_answer.slice(0,80)}..."` : ''}
          </div>
        `;
        container.appendChild(div);
      }
    }
  } catch (err) {
    addMessage('system', `Scorecard error: ${err.message}`);
  }
});
</script>
</body>
</html>
